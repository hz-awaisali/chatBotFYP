{% extends "base.html" %}
{% block content %}
<div class="mb-4 flex flex-wrap items-center justify-between gap-3">
  <div class="flex items-center gap-3">
    <div class="flex items-center gap-2">
      <span class="relative flex h-2.5 w-2.5">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full opacity-75" style="background: var(--status-pulse);"></span>
        <span class="relative inline-flex rounded-full h-2.5 w-2.5" style="background: var(--status-dot);"></span>
      </span>
      <span class="text-sm font-medium font-heading text-theme">AI Assistant</span>
    </div>
    <span class="hidden sm:inline text-[11px] font-mono text-theme-dim">POST /chat</span>
  </div>
  <label class="inline-flex cursor-pointer items-center gap-2 select-none group">
    <input type="checkbox" id="debugSources" class="sr-only peer" {% if include_sources_default %}checked{% endif %} />
    <div class="relative w-9 h-5 rounded-full transition-colors duration-200 peer-checked:bg-[#7C3AED]/50 peer-focus-visible:ring-2 peer-focus-visible:ring-[#7C3AED]/50" style="background: var(--toggle-track);">
      <div class="absolute left-0.5 top-0.5 w-4 h-4 rounded-full transition-all duration-200 peer-checked:translate-x-4" style="background: var(--toggle-dot);"></div>
    </div>
    <span class="text-xs transition-colors" style="color: var(--toggle-text);">Sources</span>
  </label>
</div>

<div id="chat" class="flex h-[min(72vh,560px)] flex-col overflow-hidden rounded-2xl border backdrop-blur-xl shadow-chat" style="background: var(--chat-bg); border-color: var(--glass-border);">
  <div id="log" class="min-h-0 flex-1 space-y-3 overflow-y-auto p-4 scroll-smooth"></div>

  <div id="loadRow" class="hidden py-3 text-center" style="border-top: 1px solid var(--glass-border-light);" aria-live="polite">
    <div class="flex items-center justify-center gap-2.5">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <form id="form" class="flex items-end gap-2 p-3" style="border-top: 1px solid var(--glass-border-light); background: var(--glass-bg);" autocomplete="off">
    <div class="relative flex-1">
      <input
        type="text"
        id="msg"
        class="w-full rounded-xl border px-4 py-3 text-sm placeholder-theme transition-all duration-200"
        style="background: var(--input-bg); border-color: var(--input-border); color: var(--text-primary);"
        placeholder="Ask a question…"
        required
      />
    </div>
    <button
      type="submit"
      id="send"
      class="shrink-0 rounded-xl px-5 py-3 text-sm font-medium text-white disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200"
      style="background: var(--btn-primary); box-shadow: 0 10px 15px -3px var(--btn-shadow);"
      onmouseover="this.style.background='var(--btn-primary-hover)'; this.style.boxShadow='0 10px 15px -3px var(--btn-shadow-hover)'"
      onmouseout="this.style.background='var(--btn-primary)'; this.style.boxShadow='0 10px 15px -3px var(--btn-shadow)'"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
    <button
      type="button"
      id="clear"
      class="shrink-0 rounded-xl border px-3.5 py-3 text-xs transition-all duration-200"
      style="border-color: var(--btn-secondary-border); color: var(--btn-secondary-text);"
      onmouseover="this.style.background='var(--btn-secondary-hover)'; this.style.color='var(--btn-secondary-text-hover)'"
      onmouseout="this.style.background='transparent'; this.style.color='var(--btn-secondary-text)'"
      title="Clear conversation"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </form>
</div>

<div id="err" class="mt-3 hidden rounded-xl border px-4 py-3 text-sm backdrop-blur-sm" style="background: var(--error-bg); border-color: var(--error-border); color: var(--error-text);" role="alert"></div>
{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
{{ super() }}
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(function () {
  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("msg");
  const sendBtn = document.getElementById("send");
  const clearBtn = document.getElementById("clear");
  const errBox = document.getElementById("err");
  const loadRow = document.getElementById("loadRow");
  const debugEl = document.getElementById("debugSources");

  function showErr(m) {
    if (!m) { errBox.classList.add("hidden"); errBox.textContent = ""; return; }
    errBox.textContent = m;
    errBox.classList.remove("hidden");
  }
  function scrollToBottom() { log.scrollTop = log.scrollHeight; }
  function setLoading(loading) {
    loadRow.classList.toggle("hidden", !loading);
    input.disabled = loading;
    sendBtn.disabled = loading;
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function normalizeEscapedTexDelimiters(md) {
    return md.replace(/\\\[\s*((?:[^\\\]]|\\.)+?)\s*\\\]/g, function(_, i) { return "$$" + i.trim() + "$$"; })
             .replace(/\\\(\s*((?:[^\\\)]|\\.)+?)\s*\\\)/g, function(_, i) { return "$" + i.trim() + "$"; });
  }

  function normalizeBracketDisplayMath(md) {
    return md.replace(/\[\s*((?:[^\\\]]|\\.)+)\s*\]/g, function(full, inner) {
      inner = inner.trim();
      if (/\\[a-zA-Z]+/.test(inner)) return "$$" + inner + "$$";
      return full;
    });
  }

  function splitDisplayMath(md) {
    var segments = [], rest = md;
    while (rest.length) {
      var start = rest.indexOf("$$");
      if (start === -1) { segments.push({ kind: "md", text: rest }); break; }
      if (start > 0) segments.push({ kind: "md", text: rest.slice(0, start) });
      var end = rest.indexOf("$$", start + 2);
      if (end === -1) { segments.push({ kind: "md", text: rest }); break; }
      segments.push({ kind: "math", text: rest.slice(start + 2, end).trim(), display: true });
      rest = rest.slice(end + 2);
    }
    return segments.length ? segments : [{ kind: "md", text: md }];
  }

  function renderAssistantMarkdown(raw) {
    var md = typeof raw === "string" ? raw : "";
    try {
      md = normalizeEscapedTexDelimiters(md);
      md = normalizeBracketDisplayMath(md);
      var segments = splitDisplayMath(md);
      var htmlParts = segments.map(function(seg) {
        if (seg.kind === "math") {
          if (typeof katex !== "undefined" && katex.renderToString) {
            return katex.renderToString(seg.text, { displayMode: true, throwOnError: false, strict: false });
          }
          return '<pre class="my-2 overflow-x-auto rounded-lg p-3 text-xs font-mono" style="background: var(--prose-pre-bg); border: 1px solid var(--prose-pre-border); color: var(--prose-pre-text);">' + escapeHtml(seg.text) + '</pre>';
        }
        var h = typeof marked !== "undefined" && marked.parse ? marked.parse(seg.text, { breaks: true }) : escapeHtml(seg.text);
        return typeof h === "string" ? h : "";
      });
      var html = htmlParts.join("");
      return typeof DOMPurify !== "undefined" && DOMPurify.sanitize
        ? DOMPurify.sanitize(html, {
            ADD_TAGS: ["svg","path","line","g","defs","use"],
            ADD_ATTR: ["style","xmlns","width","height","viewBox","preserveAspectRatio","stroke","fill","stroke-width","d","x","y","x1","y1","x2","y2","aria-hidden","aria-label","role"]
          })
        : html;
    } catch (e) { return "<p>" + escapeHtml(md) + "</p>"; }
  }

  function renderMathInBubble(el) {
    if (typeof renderMathInElement === "undefined") return;
    try {
      renderMathInElement(el, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "\\[", right: "\\]", display: true },
          { left: "$", right: "$", display: false },
          { left: "\\(", right: "\\)", display: false }
        ],
        throwOnError: false, strict: false
      });
    } catch (e) {}
  }

  function bubble(isUser, text) {
    const row = document.createElement("div");
    row.className = "flex msg-enter " + (isUser ? "justify-end" : "justify-start");
    const b = document.createElement("div");
    if (isUser) {
      b.className = "max-w-[80%] rounded-2xl rounded-br-md px-4 py-2.5 text-sm text-white whitespace-pre-wrap break-words shadow-lg";
      b.style.background = "var(--user-bubble)";
      b.style.boxShadow = "0 10px 15px -3px var(--user-shadow)";
      b.textContent = text;
    } else {
      b.className = "max-w-[85%] rounded-2xl rounded-bl-md border px-4 py-2.5 text-sm";
      b.style.background = "var(--ai-bubble-bg)";
      b.style.borderColor = "var(--ai-bubble-border)";
      b.style.borderLeft = "3px solid var(--ai-accent)";
      b.style.color = "var(--prose-text)";
      b.classList.add("prose-theme");
      b.innerHTML = renderAssistantMarkdown(text);
      renderMathInBubble(b);
    }
    row.appendChild(b);
    log.appendChild(row);
  }

  function addSources(sources) {
    if (!sources || !sources.length) return;
    const wrap = document.createElement("div");
    wrap.className = "msg-enter ml-2 mr-2 rounded-xl border p-3";
    wrap.style.background = "var(--sources-bg)";
    wrap.style.borderColor = "var(--sources-border)";
    const t = document.createElement("div");
    t.className = "flex items-center gap-2 mb-2 text-xs font-medium";
    t.style.color = "var(--sources-header)";
    t.innerHTML = '<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> Retrieved Sources';
    wrap.appendChild(t);
    const ul = document.createElement("ul");
    ul.className = "space-y-2";
    for (const s of sources) {
      const li = document.createElement("li");
      li.className = "rounded-lg border p-2.5";
      li.style.background = "var(--sources-item-bg)";
      li.style.borderColor = "var(--sources-item-border)";
      const header = document.createElement("div");
      header.className = "flex items-center justify-between mb-1";
      const src = document.createElement("span");
      src.className = "text-[11px] font-mono truncate max-w-[70%]";
      src.style.color = "var(--text-dim)";
      src.textContent = s.source || "unknown";
      const score = document.createElement("span");
      score.className = "text-[11px] font-mono";
      score.style.color = "var(--sources-score)";
      score.textContent = Number(s.score).toFixed(3);
      header.appendChild(src);
      header.appendChild(score);
      li.appendChild(header);
      const txt = document.createElement("div");
      txt.className = "text-xs leading-relaxed break-words line-clamp-3";
      txt.style.color = "var(--sources-text)";
      txt.textContent = s.text;
      li.appendChild(txt);
      ul.appendChild(li);
    }
    wrap.appendChild(ul);
    log.appendChild(wrap);
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const text = (input.value || "").trim();
    if (!text) return;
    showErr("");
    bubble(true, text);
    input.value = "";
    setLoading(true);
    scrollToBottom();
    const body = { message: text, include_sources: debugEl.checked };
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(function() { return null; });
      if (!res.ok) {
        const d = data && data.detail ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail)) : "Request failed " + res.status;
        showErr(d);
        return;
      }
      bubble(false, (data && data.reply) || "");
      if (debugEl.checked && data && data.sources) addSources(data.sources);
    } catch (err) {
      showErr(err && err.message ? err.message : "Network error");
    } finally {
      setLoading(false);
      scrollToBottom();
      input.focus();
    }
  });

  clearBtn.addEventListener("click", function() { log.innerHTML = ""; showErr(""); });
  input.focus();
})();
</script>
{% endblock %}

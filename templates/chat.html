{% extends "base.html" %}
{% block content %}
<div class="mb-4 flex flex-wrap items-center justify-between gap-3">
  <div class="flex items-center gap-3">
    <div class="flex items-center gap-2">
      <span class="relative flex h-2.5 w-2.5">
        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-[#10B981] opacity-75"></span>
        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-[#10B981]"></span>
      </span>
      <span class="text-sm font-medium text-white/80 font-heading">AI Assistant</span>
    </div>
    <span class="hidden sm:inline text-[11px] text-white/30 font-mono">POST /chat</span>
  </div>
  <label class="inline-flex cursor-pointer items-center gap-2 select-none group">
    <input type="checkbox" id="debugSources" class="sr-only peer" {% if include_sources_default %}checked{% endif %} />
    <div class="relative w-9 h-5 bg-white/[0.08] rounded-full peer-checked:bg-[#7C3AED]/50 transition-colors duration-200 peer-focus-visible:ring-2 peer-focus-visible:ring-[#7C3AED]/50">
      <div class="absolute left-0.5 top-0.5 w-4 h-4 bg-white/40 rounded-full transition-all duration-200 peer-checked:translate-x-4 peer-checked:bg-white"></div>
    </div>
    <span class="text-xs text-white/40 group-hover:text-white/60 transition-colors">Sources</span>
  </label>
</div>

<div id="chat" class="flex h-[min(72vh,560px)] flex-col overflow-hidden rounded-2xl border border-white/[0.08] bg-white/[0.02] backdrop-blur-xl shadow-2xl shadow-black/40">
  <div id="log" class="min-h-0 flex-1 space-y-3 overflow-y-auto p-4 scroll-smooth"></div>

  <div id="loadRow" class="hidden border-t border-white/[0.06] py-3 text-center" aria-live="polite">
    <div class="flex items-center justify-center gap-2.5">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
  </div>

  <form id="form" class="flex items-end gap-2 border-t border-white/[0.06] p-3 bg-white/[0.02]" autocomplete="off">
    <div class="relative flex-1">
      <input
        type="text"
        id="msg"
        class="w-full rounded-xl border border-white/[0.08] bg-white/[0.03] px-4 py-3 text-sm text-white placeholder-white/30 focus:border-[#7C3AED]/40 focus:outline-none focus:ring-2 focus:ring-[#7C3AED]/20 transition-all duration-200"
        placeholder="Ask a question…"
        required
      />
    </div>
    <button
      type="submit"
      id="send"
      class="shrink-0 rounded-xl bg-gradient-to-r from-[#7C3AED] to-[#6D28D9] px-5 py-3 text-sm font-medium text-white shadow-lg shadow-[#7C3AED]/25 hover:shadow-[#7C3AED]/40 hover:from-[#6D28D9] hover:to-[#5B21B6] disabled:opacity-40 disabled:cursor-not-allowed transition-all duration-200"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
    <button
      type="button"
      id="clear"
      class="shrink-0 rounded-xl border border-white/[0.08] px-3.5 py-3 text-xs text-white/40 hover:text-white/70 hover:bg-white/[0.04] transition-all duration-200"
      title="Clear conversation"
    >
      <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
    </button>
  </form>
</div>

<div id="err" class="mt-3 hidden rounded-xl border border-rose-500/20 bg-rose-500/10 px-4 py-3 text-sm text-rose-300 backdrop-blur-sm" role="alert"></div>
{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous" />
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
{{ super() }}
{% endblock %}

{% block scripts %}
<script>
(function () {
  const log = document.getElementById("log");
  const form = document.getElementById("form");
  const input = document.getElementById("msg");
  const sendBtn = document.getElementById("send");
  const clearBtn = document.getElementById("clear");
  const errBox = document.getElementById("err");
  const loadRow = document.getElementById("loadRow");
  const debugEl = document.getElementById("debugSources");

  function showErr(m) {
    if (!m) { errBox.classList.add("hidden"); errBox.textContent = ""; return; }
    errBox.textContent = m;
    errBox.classList.remove("hidden");
  }
  function scrollToBottom() { log.scrollTop = log.scrollHeight; }
  function setLoading(loading) {
    loadRow.classList.toggle("hidden", !loading);
    input.disabled = loading;
    sendBtn.disabled = loading;
  }
  function escapeHtml(s) {
    return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  }

  function normalizeEscapedTexDelimiters(md) {
    return md.replace(/\\\[\s*((?:[^\\\]]|\\.)+?)\s*\\\]/g, function(_, i) { return "$$" + i.trim() + "$$"; })
             .replace(/\\\(\s*((?:[^\\\)]|\\.)+?)\s*\\\)/g, function(_, i) { return "$" + i.trim() + "$"; });
  }

  function normalizeBracketDisplayMath(md) {
    return md.replace(/\[\s*((?:[^\\\]]|\\.)+)\s*\]/g, function(full, inner) {
      inner = inner.trim();
      if (/\\[a-zA-Z]+/.test(inner)) return "$$" + inner + "$$";
      return full;
    });
  }

  function splitDisplayMath(md) {
    var segments = [], rest = md;
    while (rest.length) {
      var start = rest.indexOf("$$");
      if (start === -1) { segments.push({ kind: "md", text: rest }); break; }
      if (start > 0) segments.push({ kind: "md", text: rest.slice(0, start) });
      var end = rest.indexOf("$$", start + 2);
      if (end === -1) { segments.push({ kind: "md", text: rest }); break; }
      segments.push({ kind: "math", text: rest.slice(start + 2, end).trim(), display: true });
      rest = rest.slice(end + 2);
    }
    return segments.length ? segments : [{ kind: "md", text: md }];
  }

  function renderAssistantMarkdown(raw) {
    var md = typeof raw === "string" ? raw : "";
    try {
      md = normalizeEscapedTexDelimiters(md);
      md = normalizeBracketDisplayMath(md);
      var segments = splitDisplayMath(md);
      var htmlParts = segments.map(function(seg) {
        if (seg.kind === "math") {
          if (typeof katex !== "undefined" && katex.renderToString) {
            return katex.renderToString(seg.text, { displayMode: true, throwOnError: false, strict: false });
          }
          return '<pre class="my-2 overflow-x-auto rounded-lg border border-white/[0.06] bg-black/40 p-3 text-xs text-white/60 font-mono">' + escapeHtml(seg.text) + '</pre>';
        }
        var h = typeof marked !== "undefined" && marked.parse ? marked.parse(seg.text, { breaks: true }) : escapeHtml(seg.text);
        return typeof h === "string" ? h : "";
      });
      var html = htmlParts.join("");
      return typeof DOMPurify !== "undefined" && DOMPurify.sanitize
        ? DOMPurify.sanitize(html, {
            ADD_TAGS: ["svg","path","line","g","defs","use"],
            ADD_ATTR: ["style","xmlns","width","height","viewBox","preserveAspectRatio","stroke","fill","stroke-width","d","x","y","x1","y1","x2","y2","aria-hidden","aria-label","role"]
          })
        : html;
    } catch (e) { return "<p>" + escapeHtml(md) + "</p>"; }
  }

  function renderMathInBubble(el) {
    if (typeof renderMathInElement === "undefined") return;
    try {
      renderMathInElement(el, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "\\[", right: "\\]", display: true },
          { left: "$", right: "$", display: false },
          { left: "\\(", right: "\\)", display: false }
        ],
        throwOnError: false, strict: false
      });
    } catch (e) {}
  }

  function bubble(isUser, text) {
    const row = document.createElement("div");
    row.className = "flex msg-enter " + (isUser ? "justify-end" : "justify-start");
    const b = document.createElement("div");
    if (isUser) {
      b.className = "max-w-[80%] rounded-2xl rounded-br-md bg-gradient-to-br from-[#7C3AED] to-[#6D28D9] px-4 py-2.5 text-sm text-white shadow-lg shadow-[#7C3AED]/20 whitespace-pre-wrap break-words";
      b.textContent = text;
    } else {
      b.className = "max-w-[85%] rounded-2xl rounded-bl-md border border-white/[0.06] border-l-[3px] border-l-[#A78BFA] bg-white/[0.03] px-4 py-2.5 text-sm text-white/90 " +
        "prose prose-invert prose-sm max-w-none prose-p:my-1.5 prose-ul:my-1.5 prose-ol:my-1.5 " +
        "prose-headings:my-2 prose-headings:font-semibold prose-li:my-0.5 " +
        "prose-pre:bg-black/40 prose-pre:border prose-pre:border-white/[0.06] prose-pre:text-white/80 " +
        "prose-code:text-[#A78BFA] prose-code:bg-white/[0.04] prose-code:px-1 prose-code:py-0.5 prose-code:rounded " +
        "prose-a:text-[#7C3AED] prose-blockquote:border-[#A78BFA]/40 prose-blockquote:text-white/50 " +
        "[&_.katex-display]:my-2 [&_.katex-display]:overflow-x-auto [&_.katex]:text-inherit";
      b.innerHTML = renderAssistantMarkdown(text);
      renderMathInBubble(b);
    }
    row.appendChild(b);
    log.appendChild(row);
  }

  function addSources(sources) {
    if (!sources || !sources.length) return;
    const wrap = document.createElement("div");
    wrap.className = "msg-enter ml-2 mr-2 rounded-xl border border-white/[0.06] bg-white/[0.02] p-3";
    const t = document.createElement("div");
    t.className = "flex items-center gap-2 mb-2 text-xs font-medium text-[#A78BFA]";
    t.innerHTML = '<svg class="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg> Retrieved Sources';
    wrap.appendChild(t);
    const ul = document.createElement("ul");
    ul.className = "space-y-2";
    for (const s of sources) {
      const li = document.createElement("li");
      li.className = "rounded-lg border border-white/[0.04] bg-white/[0.02] p-2.5";
      const header = document.createElement("div");
      header.className = "flex items-center justify-between mb-1";
      const src = document.createElement("span");
      src.className = "text-[11px] font-mono text-white/30 truncate max-w-[70%]";
      src.textContent = s.source || "unknown";
      const score = document.createElement("span");
      score.className = "text-[11px] font-mono text-white/20";
      score.textContent = Number(s.score).toFixed(3);
      header.appendChild(src);
      header.appendChild(score);
      li.appendChild(header);
      const txt = document.createElement("div");
      txt.className = "text-xs text-white/50 leading-relaxed break-words line-clamp-3";
      txt.textContent = s.text;
      li.appendChild(txt);
      ul.appendChild(li);
    }
    wrap.appendChild(ul);
    log.appendChild(wrap);
  }

  form.addEventListener("submit", async function(e) {
    e.preventDefault();
    const text = (input.value || "").trim();
    if (!text) return;
    showErr("");
    bubble(true, text);
    input.value = "";
    setLoading(true);
    scrollToBottom();
    const body = { message: text, include_sources: debugEl.checked };
    try {
      const res = await fetch("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json", Accept: "application/json" },
        body: JSON.stringify(body)
      });
      const data = await res.json().catch(function() { return null; });
      if (!res.ok) {
        const d = data && data.detail ? (typeof data.detail === "string" ? data.detail : JSON.stringify(data.detail)) : "Request failed " + res.status;
        showErr(d);
        return;
      }
      bubble(false, (data && data.reply) || "");
      if (debugEl.checked && data && data.sources) addSources(data.sources);
    } catch (err) {
      showErr(err && err.message ? err.message : "Network error");
    } finally {
      setLoading(false);
      scrollToBottom();
      input.focus();
    }
  });

  clearBtn.addEventListener("click", function() { log.innerHTML = ""; showErr(""); });
  input.focus();
})();
</script>
{% endblock %}

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}University RAG Chatbot{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-slate-950 text-slate-100 antialiased">
  <header class="border-b border-slate-800 bg-slate-900/80 backdrop-blur">
    <div class="mx-auto flex max-w-3xl items-center justify-between px-4 py-3">
      <a href="/" class="text-sm font-semibold text-white">RAG University Chat</a>
      <nav class="flex gap-4 text-xs text-slate-400">
        <a class="hover:text-slate-200" href="/">Chat</a>
        <a class="hover:text-slate-200" href="/admin">Admin</a>
        <a class="hover:text-slate-200" href="/docs">API docs</a>
        <a class="hover:text-slate-200" href="/health">Health</a>
      </nav>
    </div>
  </header>
  <main class="mx-auto max-w-3xl px-4 py-6">{% block content %}{% endblock %}</main>
  {% block scripts %}{% endblock %}
</body>
</html>
